<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF 생성기</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family:sans-serif; padding:10px; background:#f5f5f5; }

.preview {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
}

.preview img { width:100%; border-radius:6px; }

button,input {
  width:100%;
  margin-top:6px;
  padding:10px;
}

.modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.modal img { max-width:90%; }

iframe {
  width:100%;
  height:400px;
  margin-top:10px;
}
</style>
</head>

<body>

<h3>📄 PDF 생성기</h3>

<input type="file" id="fileInput" multiple accept="image/*">

<button onclick="generatePDF()">PDF 생성</button>
<button onclick="sharePDF()">메일/카톡 공유</button>

<div class="preview" id="preview"></div>

<div class="modal" id="modal">
  <img id="cropImage">
  <button onclick="applyCrop()">적용</button>
  <button onclick="closeModal()">취소</button>
</div>

<iframe id="pdfPreview"></iframe>

<script>
let images = [];
let cropper = null;
let currentIndex = null;
let pdfBlob = null;

document.getElementById('fileInput').addEventListener('change', async (e)=>{
  images = [];
  for (let file of e.target.files){
    const url = URL.createObjectURL(file);
    images.push({ src:url, cropped:null });
  }
  renderPreview();
});

function renderPreview(){
  const preview = document.getElementById('preview');
  preview.innerHTML='';

  images.forEach((item,index)=>{
    const img = document.createElement('img');
    img.src = item.cropped || item.src;
    img.onclick = ()=> openCrop(index);
    preview.appendChild(img);
  });
}

function openCrop(index){
  currentIndex = index;
  const modal = document.getElementById('modal');
  const image = document.getElementById('cropImage');

  image.src = images[index].cropped || images[index].src;

  modal.style.display='flex';

  if(cropper) cropper.destroy();

  cropper = new Cropper(image,{
    viewMode:1,
    movable:true,
    zoomable:true,
    scalable:true
  });
}

function applyCrop(){
  const canvas = cropper.getCroppedCanvas();
  images[currentIndex].cropped = canvas.toDataURL();
  cropper.destroy();
  closeModal();
  renderPreview();
}

function closeModal(){
  document.getElementById('modal').style.display='none';
}

async function generatePDF(){
  const { jsPDF } = window.jspdf;

  const pdf = new jsPDF({
    unit:'mm',
    format:'a4'
  });

  const margin = 5;
  const gap = 5;
  const cols = 3;
  const pageWidth = 210;

  const imgWidth = (pageWidth - margin*2 - gap*2)/cols;
  const imgHeight = imgWidth * 1.8;

  let x = margin;
  let y = margin;

  for(let i=0;i<images.length;i++){
    const src = images[i].cropped || images[i].src;

    pdf.addImage(src,'JPEG',x,y,imgWidth,imgHeight);

    if((i+1)%3===0){
      x = margin;
      y += imgHeight + gap;

      if(y + imgHeight > 297){
        pdf.addPage();
        y = margin;
      }
    } else {
      x += imgWidth + gap;
    }
  }

  pdfBlob = pdf.output("blob");

  const url = URL.createObjectURL(pdfBlob);
  document.getElementById('pdfPreview').src = url;

  const a = document.createElement("a");
  a.href = url;
  a.download = "result.pdf";
  a.click();
}

// ✅ 핵심 공유 기능
async function sharePDF(){
  if(!pdfBlob){
    alert("PDF 먼저 생성하세요");
    return;
  }

  const file = new File([pdfBlob], "result.pdf", {
    type: "application/pdf"
  });

  if(navigator.share){
    await navigator.share({
      files:[file],
      title:"PDF 공유"
    });
  } else {
    alert("이 기기는 공유 기능을 지원하지 않습니다");
  }
}
</script>

</body>
</html>
